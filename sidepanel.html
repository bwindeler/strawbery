<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Eval Harness</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #f8f9fa;
      color: #1a1a1a;
      padding: 12px;
      min-width: 300px;
    }

    h2 { font-size: 15px; font-weight: 600; margin-bottom: 10px; }
    h3 { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }

    label.field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 3px;
      margin-top: 8px;
    }

    label.field-label:first-child { margin-top: 0; }

    /* ── Targets checklist ── */
    .target-row {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 4px 0;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }

    .target-row input[type="checkbox"] { width: 14px; height: 14px; cursor: pointer; }

    /* ── Script loader ── */
    .script-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .script-name {
      flex: 1;
      font-size: 12px;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-style: italic;
    }

    .script-name.loaded { color: #16a34a; font-style: normal; font-weight: 500; }

    #load-script-btn {
      white-space: nowrap;
      padding: 5px 9px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
    }

    #load-script-btn:hover { background: #f5f5f5; }

    #script-file-input { display: none; }

    /* ── Buttons ── */
    button {
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
      padding: 5px 10px;
      background: #fff;
    }

    #run-btn {
      width: 100%;
      padding: 9px;
      font-size: 14px;
      font-weight: 600;
      background: #4f7cf7;
      color: #fff;
      border-color: #4f7cf7;
      margin-bottom: 6px;
    }

    #run-btn:hover:not(:disabled) { background: #3b69e8; }
    #run-btn:disabled { background: #a0b4f0; border-color: #a0b4f0; cursor: not-allowed; }

    #save-btn {
      width: 100%;
      padding: 8px;
      font-weight: 600;
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
      margin-bottom: 8px;
    }

    #save-btn:hover { background: #333; }

    /* ── Status / error ── */
    .hidden { display: none !important; }

    #status-msg {
      text-align: center;
      font-size: 12px;
      color: #666;
      font-style: italic;
      padding: 5px 0;
    }

    #error-msg {
      background: #fee2e2;
      border: 1px solid #fca5a5;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 12px;
      color: #dc2626;
      margin-bottom: 8px;
    }

    /* ── Progress ── */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid #ccc;
      border-top-color: #4f7cf7;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Transcript / results ── */
    .target-card { margin-bottom: 8px; }

    .target-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .target-name { font-weight: 600; font-size: 13px; }

    .target-status { font-size: 11px; color: #888; }
    .target-status.done { color: #16a34a; }
    .target-status.error { color: #dc2626; }

    .turn-block { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; }
    .turn-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

    .turn-number { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }

    .prompt-text {
      background: #f0f4ff;
      border-left: 3px solid #4f7cf7;
      padding: 5px 8px;
      border-radius: 0 3px 3px 0;
      font-size: 12px;
      white-space: pre-wrap;
      margin-bottom: 6px;
    }

    .response-text {
      background: #f5f5f5;
      border: 1px solid #e8e8e8;
      border-radius: 4px;
      padding: 7px 9px;
      font-size: 12px;
      line-height: 1.5;
      max-height: 220px;
      overflow-y: auto;
      margin-bottom: 6px;
    }

    .response-text ol, .response-text ul { padding-left: 18px; margin: 2px 0; }
    .response-text li { margin: 1px 0; }
    .response-text h4, .response-text h5, .response-text h6 { font-size: 12px; font-weight: 600; margin: 4px 0 2px; }
    .response-text pre { background: #e8e8e8; border-radius: 3px; padding: 5px 7px; overflow-x: auto; font-size: 11px; margin: 3px 0; }
    .response-text code { background: #e8e8e8; border-radius: 2px; padding: 1px 3px; font-size: 11px; font-family: monospace; }
    .response-text pre code { background: none; padding: 0; }

    .error-text { color: #dc2626; font-size: 12px; padding: 4px 0; }
  </style>
</head>
<body>
  <h2>AI Eval Harness</h2>

  <!-- ── Script loader ── -->
  <div class="card">
    <label class="field-label">Eval Script</label>
    <div class="script-row">
      <span class="script-name" id="script-name">No script loaded</span>
      <button id="load-script-btn">📂 Load JSON</button>
      <input type="file" id="script-file-input" accept=".json,application/json" />
    </div>
  </div>

  <!-- ── Targets ── -->
  <div class="card">
    <h3>Targets</h3>
    <div id="targets-list"><!-- populated by targets.js + sidepanel.js --></div>
  </div>

  <!-- ── Options ── -->
  <div class="card" style="padding: 8px 12px;">
    <label class="target-row" style="font-size:12px; color:#555;">
      <input type="checkbox" id="close-tabs-toggle" />
      Close tabs when done
    </label>
  </div>

  <!-- ── Run ── -->
  <button id="run-btn" disabled>▶ Run All Targets</button>

  <div id="status-msg" class="hidden"></div>
  <div id="error-msg" class="hidden"></div>

  <!-- ── Progress ── -->
  <div id="progress-section" class="card hidden">
    <div class="progress-row">
      <span class="spinner"></span>
      <span id="progress-text">Starting…</span>
    </div>
  </div>

  <!-- ── Results ── -->
  <div id="results-section" class="hidden">
    <!-- target cards injected here by sidepanel.js -->
  </div>

  <button id="save-btn" class="hidden">💾 Save transcript</button>

  <!-- Load in order: targets first, then orchestrator, then app logic -->
  <script src="targets.js"></script>
  <script src="orchestrator.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
